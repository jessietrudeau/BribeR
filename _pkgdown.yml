url: https://jessietrudeau.github.io/BribeR

template:
  bootstrap: 5
  light-switch: true

home:
  title: "BribeR: Tools for Analyzing the Vladivideos Corruption Transcripts"
  description: >
    An R package for accessing and analyzing the Vladivideos — secret
    recordings documenting systematic corruption under Peru's Fujimori
    government in the 1990s.

  sidebar:
    structure: [links, license, citation, authors, dev]


navbar:
  structure:
    left:  [home, reference, articles, news]
    right: [search, lightswitch, github]
  components:
    articles:
      text: Articles
      menu:
        - text: "Raw Data Guide"
          href: articles/raw_data_guide.html
        - text: "BribeR Data Guide"
          href: articles/briber_data_guide.html
        - text: "Using BribeR"
          href: articles/using_briber.html
        - text: "Visualizing BribeR (Shiny)"
          href: articles/visualizing_briber.html

reference:
  - title: "Reading Transcripts"
    desc: "Load and filter the Vladivideos transcript corpus."
    contents:
      - read_transcripts
      - get_transcripts_raw

  - title: "Finding Transcripts"
    desc: "Search the corpus by speaker or topic."
    contents:
      - get_transcript_id
      - get_transcript_speakers

  - title: "Metadata"
    desc: "Transcript-level summary information."
    contents:
      - read_transcript_meta_data

  - title: "Visualization"
    desc: "Interactive network visualization."
    contents:
      - run_transcript_network_app

  - title: "Datasets"
    desc: "Bundled datasets included in BribeR."
    contents:
      - compiled_transcripts
      - descriptions
      - transcript_index
      - speakers_per_transcript
      - actors
      - actors_description
      - topic_descriptions

articles:
  - title: "Articles"
    navbar: ~
    contents:
      - raw_data_guide
      - briber_data_guide
      - using_briber
      - visualizing_briber

